<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PyCloud IDE — ULTIMATE BEAST MODE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0d0f14; --surface:#13161e; --border:#1f2433;
      --accent:#00e5ff; --accent2:#7c3aed; --green:#00ff9d;
      --red:#ff4f6a; --text:#e2e8f0; --muted:#4a5568; --panel:#0f1219;
      --sidebar-bg:#1a1d26; --console-bg:var(--panel);
      --glow:rgba(0,229,255,0.3);
      --status-bar:#7c3aed;
    }
    body.theme-light {
      --bg:#f8fafc; --surface:#ffffff; --border:#e2e8f0;
      --accent:#0ea5e9; --accent2:#8b5cf6; --green:#10b981;
      --red:#ef4444; --text:#1e293b; --muted:#64748b; --panel:#f1f5f9;
      --sidebar-bg:#e2e8f0; --console-bg:#f8fafc;
      --glow:rgba(14,165,233,0.25);
      --status-bar:#8b5cf6;
    }
    body.theme-red {
      --bg:#0f0608; --surface:#1a0c0e; --border:#3d1520;
      --accent:#ff4f6a; --accent2:#c0392b; --green:#ff8c69;
      --red:#ff1744; --text:#fde8ea; --muted:#7f3a42; --panel:#12060a;
      --sidebar-bg:#1f0d10; --console-bg:#12060a;
      --glow:rgba(255,79,106,0.3);
      --status-bar:#c0392b;
    }
    body.theme-green {
      --bg:#060f08; --surface:#0c1a0e; --border:#153d1e;
      --accent:#00ff9d; --accent2:#16a34a; --green:#39ff14;
      --red:#ff4f6a; --text:#e8fdee; --muted:#3a7f4a; --panel:#060c07;
      --sidebar-bg:#0d1f10; --console-bg:#060c07;
      --glow:rgba(0,255,157,0.3);
      --status-bar:#16a34a;
    }
    body.theme-blue {
      --bg:#060a0f; --surface:#0c131a; --border:#152033;
      --accent:#00b4ff; --accent2:#1d4ed8; --green:#00e5ff;
      --red:#ff4f6a; --text:#e8f4fd; --muted:#3a5a7f; --panel:#060c12;
      --sidebar-bg:#0d1520; --console-bg:#060c12;
      --glow:rgba(0,180,255,0.3);
      --status-bar:#1d4ed8;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Syne',sans-serif; background:var(--bg);
      color:var(--text); height:100vh; display:flex;
      flex-direction:column; overflow:hidden;
      transition:background 0.3s,color 0.3s;
    }

    #ideGateOverlay { position:fixed; inset:0; z-index:9999; display:none; pointer-events:all; }
    #ideGateOverlay.gate-visible { display:flex; }
    #ideGateOverlay.gate-done { pointer-events:none; }
    .gate { width:50%; height:100%; background:#0d0f14; background-size:cover; background-repeat:no-repeat; position:relative; overflow:hidden; }
    .gate-left  { background-position:right center; }
    .gate-right { background-position:left center; }
    .gate-decor { position:absolute; inset:0; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,229,255,0.018) 3px,rgba(0,229,255,0.018) 4px),linear-gradient(to right,rgba(124,58,237,0.25) 0%,transparent 80%); }
    .gate-right .gate-decor { background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,229,255,0.018) 3px,rgba(0,229,255,0.018) 4px),linear-gradient(to left,rgba(124,58,237,0.25) 0%,transparent 80%); }
    #ideGateCrack { position:absolute; top:0; left:calc(50% - 1px); width:2px; height:100%; z-index:2; background:linear-gradient(to bottom,transparent,var(--accent) 25%,rgba(255,255,255,0.95) 50%,var(--accent) 75%,transparent); box-shadow:0 0 20px 8px rgba(0,229,255,0.7),0 0 60px 25px rgba(0,229,255,0.35); animation:crackGlow 0.9s ease-in-out infinite alternate; }
    @keyframes crackGlow { from{box-shadow:0 0 15px 6px rgba(0,229,255,0.55),0 0 45px 18px rgba(0,229,255,0.28);} to{box-shadow:0 0 30px 14px rgba(0,229,255,1),0 0 80px 36px rgba(0,229,255,0.6);} }
    #ideGateFog { position:absolute; inset:0; pointer-events:none; z-index:3; background:radial-gradient(ellipse at 50% 50%,rgba(150,210,255,0.22) 0%,rgba(0,229,255,0.07) 40%,transparent 70%); }
    #ideGateOverlay.opening .gate-left  { animation:gateStruggleLeft  3s cubic-bezier(0.23,1,0.32,1) forwards; }
    #ideGateOverlay.opening .gate-right { animation:gateStruggleRight 3s cubic-bezier(0.23,1,0.32,1) forwards; }
    #ideGateOverlay.opening #ideGateFog   { animation:fogDissipate 3.2s ease-out forwards; }
    #ideGateOverlay.opening #ideGateCrack { animation:crackFade    3.2s ease-out forwards; }
    @keyframes gateStruggleLeft { 0%{transform:translateX(0);}5%{transform:translateX(-5%);}10%{transform:translateX(-1%);}18%{transform:translateX(-9%);}26%{transform:translateX(-4%);}36%{transform:translateX(-16%);}45%{transform:translateX(-9%);}57%{transform:translateX(-32%);}68%{transform:translateX(-22%);}82%{transform:translateX(-65%);}100%{transform:translateX(-104%);} }
    @keyframes gateStruggleRight { 0%{transform:translateX(0);}5%{transform:translateX(5%);}10%{transform:translateX(1%);}18%{transform:translateX(9%);}26%{transform:translateX(4%);}36%{transform:translateX(16%);}45%{transform:translateX(9%);}57%{transform:translateX(32%);}68%{transform:translateX(22%);}82%{transform:translateX(65%);}100%{transform:translateX(104%);} }
    @keyframes fogDissipate { 0%{opacity:1;}60%{opacity:0.45;}100%{opacity:0;} }
    @keyframes crackFade    { 0%{opacity:1;}55%{opacity:1;}85%{opacity:0.3;}100%{opacity:0;} }

    header { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:0 16px; height:60px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:100; transition:background 0.3s,border-color 0.3s; }
    .header-left { display:flex; gap:6px; align-items:center; flex-wrap:nowrap; }
    .header-right { display:flex; gap:6px; align-items:center; justify-content:flex-end; }
    .header-logo { width:48px; height:48px; display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:10px; transition:background 0.2s; border:1px solid transparent; }
    .header-logo:hover { background:rgba(255,255,255,0.06); border-color:var(--border); }
    .header-logo img { max-width:100%; max-height:100%; object-fit:contain; display:none; }
    .header-logo img.loaded { display:block; }

    button { font-family:'Space Mono',monospace; font-size:10px; font-weight:700; padding:6px 11px; border:none; border-radius:6px; cursor:pointer; transition:all 0.15s; letter-spacing:0.4px; white-space:nowrap; display:flex; align-items:center; gap:5px; }
    button.clicked { border:2px solid var(--red) !important; }
    button img.btn-icon { height:14px; width:auto; object-fit:contain; }
    #runBtn { background:var(--green); color:#000; font-size:12px; padding:8px 18px; box-shadow:0 0 14px rgba(0,255,157,0.2); }
    #runBtn:hover { filter:brightness(1.15); transform:translateY(-1px); box-shadow:0 0 22px rgba(0,255,157,0.45); }
    #runBtn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    #saveBtn { background:var(--accent); color:#000; }
    #loadBtn { background:var(--accent2); color:#fff; }
    #settingsBtn,#profileBtn,#assetsBtn { background:var(--border); color:var(--text); }
    #logoutBtn { background:transparent; color:var(--muted); border:1px solid var(--border); }
    #logoutBtn:hover { color:var(--red); border-color:var(--red); }
    #themeToggle { background:var(--border); color:var(--text); font-size:13px; padding:6px 10px; }
    #projectName { background:var(--panel); border:1px solid var(--border); color:var(--text); font-family:'Space Mono',monospace; font-size:11px; padding:5px 10px; border-radius:6px; width:130px; outline:none; }

    main { flex:1; display:flex; overflow:hidden; position:relative; }
    #consoleBg { position:absolute; inset:0; background-size:cover; background-position:center; opacity:0.2; pointer-events:none; z-index:0; }
    .editor-panel { flex:1; display:flex; flex-direction:column; min-width:0; border-right:1px solid var(--border); z-index:10; }
    .output-panel { flex:1; display:flex; flex-direction:column; background:var(--console-bg); z-index:10; position:relative; }
    .panel-label { font-size:10px; font-weight:700; letter-spacing:2px; color:var(--muted); padding:8px 16px; background:var(--surface); border-bottom:1px solid var(--border); text-transform:uppercase; }
    #editor { flex:1; overflow:hidden; }
    .output-header { display:flex; align-items:center; justify-content:space-between; padding:8px 16px; background:var(--surface); border-bottom:1px solid var(--border); }
    #clearBtn { background:transparent; color:var(--muted); font-size:10px; padding:3px 8px; border:1px solid var(--border); }
    #output-container { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    #output { flex:1; font-family:'Space Mono',monospace; font-size:12.5px; line-height:1.7; padding:16px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; color:var(--green); }
    #console-input-line { display:flex; align-items:center; padding:8px 16px; background:rgba(0,0,0,0.18); border-top:1px solid var(--border); font-family:'Space Mono',monospace; font-size:12.5px; color:var(--accent); }
    #console-prompt { margin-right:8px; font-weight:bold; }
    #console-input { flex:1; background:transparent; border:none; outline:none; color:inherit; font-family:inherit; font-size:inherit; }

    .boss-sidebar { width:290px; background:var(--sidebar-bg); display:flex; flex-direction:column; border-left:1px solid var(--border); transition:background 0.3s; z-index:10; }
    .boss-header { padding:12px 14px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
    .boss-avatar { width:32px; height:32px; background:var(--accent2); border-radius:50%; display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
    .boss-avatar img { width:100%; height:100%; object-fit:cover; }
    .boss-name { font-weight:800; font-size:14px; color:var(--accent); }
    .boss-chat { flex:1; padding:14px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; font-family:'Space Mono',monospace; font-size:11.5px; }
    .msg { max-width:88%; padding:9px 13px; border-radius:12px; line-height:1.45; transition: opacity 0.5s ease; }
    .msg.boss { background:var(--surface); color:var(--text); align-self:flex-start; border-bottom-left-radius:2px; border:1px solid var(--border); }
    .msg.fade-out { opacity: 0; }
    .typing-indicator { font-size:10px; color:var(--muted); padding:0 14px 8px; font-style:italic; }

    #statusBar { height:24px; background:var(--status-bar); display:flex; align-items:center; padding:0 16px; font-family:'Space Mono',monospace; font-size:10px; color:#fff; flex-shrink:0; gap:16px; z-index:100; }
    #statusText { flex:1; }

    #loaderOverlay { position:fixed; inset:0; background:rgba(13,15,20,0.95); z-index:2000; display:none; flex-direction:column; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
    .loader-card { width:320px; text-align:center; }
    .loader-title { font-weight:800; font-size:18px; color:var(--accent); margin-bottom:8px; }
    .loader-status { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:20px; }
    .progress-container { width:100%; height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin-bottom:12px; }
    #progressBar { width:0%; height:100%; background:var(--accent2); transition:width 0.3s ease; }
    .loader-eta { font-family:'Space Mono',monospace; font-size:10px; color:var(--accent2); }

    #commandPalette { position:fixed; top:18%; left:50%; transform:translateX(-50%); width:500px; background:var(--surface); border:1px solid var(--accent); border-radius:12px; z-index:3000; display:none; flex-direction:column; box-shadow:0 20px 50px rgba(0,0,0,0.55); }
    #commandInput { width:100%; background:transparent; border:none; border-bottom:1px solid var(--border); padding:14px 16px; color:var(--text); font-family:'Space Mono',monospace; font-size:13px; outline:none; }
    .command-item { padding:11px 16px; cursor:pointer; font-size:11px; font-family:'Space Mono',monospace; display:flex; justify-content:space-between; transition:background 0.1s; }
    .command-item:hover,.command-item.selected { background:var(--accent2); color:#fff; }
    .command-shortcut { color:var(--muted); font-size:10px; }

    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.72); z-index:1000; align-items:center; justify-content:center; }
    .modal-bg.open { display:flex; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; width:500px; max-width:92vw; max-height:90vh; overflow-y:auto; }
    .modal h3 { font-size:16px; margin-bottom:16px; color:var(--accent); }
    .modal-close { margin-top:16px; background:var(--border); color:var(--text); width:100%; padding:8px; }
    .modal-input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Space Mono',monospace; font-size:13px; padding:10px 14px; outline:none; }
    .save-settings-btn { background:var(--green); color:#000; width:100%; padding:10px; margin-top:8px; }
    .theme-picker { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:20px; }
    .theme-btn { height:40px; border-radius:8px; border:2px solid transparent; cursor:pointer; transition:all 0.2s; font-size:9px; font-weight:700; text-align:center; }
    .theme-btn.active { border-color:var(--accent); transform:scale(1.05); }
    .theme-btn-dark  { background:#0d0f14; color:#00e5ff; }
    .theme-btn-light { background:#f8fafc; color:#0ea5e9; border:1px solid #e2e8f0; }
    .theme-btn-red   { background:#3d1520; color:#ff4f6a; }
    .theme-btn-green { background:#153d1e; color:#00ff9d; }
    .theme-btn-blue  { background:#152033; color:#00b4ff; }

    .rank-badge-big { display:flex; align-items:center; justify-content:center; gap:12px; padding:16px 0 6px; }
    .rank-icon-big { font-size:36px; }
    .rank-name-big { font-size:18px; font-weight:800; }
    .rank-bar-wrap { margin:10px 0 4px; }
    .rank-bar-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .rank-bar-fill { height:100%; border-radius:3px; transition:width 0.9s; }
    .rank-bar-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); text-align:center; }
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:12px 0; }
    .stat-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:10px; text-align:center; }
    .stat-value { font-family:'Space Mono',monospace; font-size:17px; font-weight:700; color:var(--accent); }
    .stat-label { font-family:'Space Mono',monospace; font-size:8px; color:var(--muted); text-transform:uppercase; margin-top:3px; }
    .ach-list { max-height:220px; overflow-y:auto; }
    .ach-item { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .ach-icon { font-size:18px; width:26px; text-align:center; }
    .ach-meta { flex:1; }
    .ach-name { font-size:11px; font-weight:700; }
    .ach-desc { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); }
    .ach-bar { height:3px; background:var(--border); border-radius:2px; margin-top:5px; overflow:hidden; }
    .ach-fill { height:100%; border-radius:2px; transition:width 0.6s; }
    .ach-unlocked .ach-fill { background:var(--green); }
    .ach-locked .ach-fill { background:var(--accent2); }

    #toast { position:fixed; bottom:36px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface); border:1px solid var(--accent); color:var(--accent); font-family:'Space Mono',monospace; font-size:12px; padding:10px 20px; border-radius:8px; opacity:0; transition:all 0.3s; pointer-events:none; z-index:999; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    .admin-only { display: none; }
    body.is-admin .admin-only { display: block; }
  </style>
</head>
<body class="theme-dark">

<div id="ideGateOverlay">
  <div class="gate gate-left"  id="ideLeftGate"><div class="gate-decor"></div></div>
  <div class="gate gate-right" id="ideRightGate"><div class="gate-decor"></div></div>
  <div id="ideGateCrack"></div>
  <div id="ideGateFog"></div>
</div>

<div id="loaderOverlay">
  <div class="loader-card">
    <div class="loader-title">INITIALIZING ENGINE</div>
    <div class="loader-status" id="loaderStatus">Starting download...</div>
    <div class="progress-container"><div id="progressBar"></div></div>
    <div class="loader-eta" id="loaderEta">ESTIMATED TIME: --s</div>
  </div>
</div>

<div id="commandPalette">
  <input type="text" id="commandInput" placeholder="Type a command (e.g. 'save', 'run', 'theme')...">
  <div id="commandList"></div>
</div>

<header>
  <div class="header-left">
    <button id="settingsBtn" class="admin-only" onclick="openModal('settingsModal')"><img id="settingsBtnIcon" class="btn-icon" style="display:none;" src=""><span id="settingsBtnLabel">⚙️ Settings</span></button>
    <button id="assetsBtn" class="admin-only" onclick="openModal('assetsModal')">🖼️ Assets</button>
    <button id="loadBtn" onclick="openLoadModal()">📂 Load</button>
    <button id="saveBtn" onclick="saveProject()"><img id="saveBtnIcon" class="btn-icon" style="display:none;" src=""><span id="saveBtnLabel">💾 Save</span></button>
    <button id="profileBtn" onclick="openModal('profileModal')"><img id="profileBtnIcon" class="btn-icon" style="display:none;" src=""><span id="profileBtnLabel">👤 Profile</span></button>
  </div>
  <div class="header-logo" onclick="toggleCommandPalette()"><img id="headerLogo" src="" alt="logo"></div>
  <div class="header-right">
    <input id="projectName" type="text" value="my_project"/>
    <button id="runBtn" onclick="handleRunClick()"><img id="runBtnIcon" class="btn-icon" style="display:none;" src=""><span id="runBtnLabel">▶ RUN</span></button>
    <button id="themeToggle">🎨</button>
    <button id="logoutBtn" onclick="logout()">↩ EXIT</button>
  </div>
</header>

<main>
  <div id="consoleBg"></div>
  <div class="editor-panel">
    <div class="panel-label">editor — python</div>
    <div id="editor"></div>
  </div>
  <div class="output-panel">
    <div class="output-header"><span class="panel-label">console</span><button id="clearBtn">✕ clear</button></div>
    <div id="output-container">
      <div id="output"></div>
      <div id="console-input-line"><span id="console-prompt">>>></span><input type="text" id="console-input" placeholder="Type Python here..." autocomplete="off"></div>
    </div>
  </div>
  <div class="boss-sidebar">
    <div class="boss-header"><div class="boss-avatar" id="bossAvatar">🕶️</div><div><div class="boss-name" id="bossDisplayName">Boss AI</div><div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);">Personal IDE</div></div></div>
    <div class="boss-chat" id="bossChat"></div>
    <div class="typing-indicator" id="typingIndicator" style="display:none;">Boss is watching you type...</div>
  </div>
</main>

<div id="statusBar"><span id="statusText">⚡ Engine standby. Click Run to initialize.</span><span id="pyVersion"></span></div>
<div id="toast"></div>

<!-- MODALS -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h3>⚙️ Global Settings</h3>
    <div class="input-group"><label class="input-label">Site Name</label><input class="modal-input" id="setSiteName" placeholder="PyCloud"></div>
    <div class="input-group"><label class="input-label">Display Name</label><input class="modal-input" id="setDisplayName" placeholder="Boss"></div>
    <div class="input-group"><label class="input-label">Global Passkey</label><input class="modal-input" id="setGlobalPass" placeholder="MOON"></div>
    <button class="save-settings-btn" onclick="saveGlobalSettings()">Update Globally</button>
    <button class="modal-close" onclick="closeModal('settingsModal')">Cancel</button>
  </div>
</div>

<div class="modal-bg" id="assetsModal">
  <div class="modal">
    <h3>🖼️ Asset Manager</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <button onclick="pickAndUpload('logoUrl')">🏷️ Logo</button>
      <button onclick="pickAndUpload('backgroundUrl')">🌄 Background</button>
      <button onclick="pickAndUpload('aiSymbolUrl')">🤖 AI Avatar</button>
      <button onclick="pickAndUpload('consoleBgUrl')">🖥️ Console BG</button>
      <button onclick="pickAndUpload('gateLeftUrl')">◀ Left Gate</button>
      <button onclick="pickAndUpload('gateRightUrl')">Right Gate ▶</button>
      <button onclick="pickAndUpload('settingsIconUrl')">⚙️ Settings Icon</button>
      <button onclick="pickAndUpload('profileIconUrl')">👤 Profile Icon</button>
      <button onclick="pickAndUpload('runIconUrl')">▶ Run Icon</button>
      <button onclick="pickAndUpload('saveIconUrl')">💾 Save Icon</button>
    </div>
    <div id="uploadProgress" style="display:none;margin-top:12px;"><div id="uploadBar" style="height:4px;background:var(--accent);width:0%;"></div></div>
    <button class="modal-close" onclick="closeModal('assetsModal')">Close</button>
  </div>
</div>

<div class="modal-bg" id="profileModal">
  <div class="modal">
    <h3>👤 <span id="profileNameDisplay">User</span></h3>
    <div id="profileRankBadge" class="rank-badge-big"></div>
    <div id="profileScore" style="text-align:center;font-weight:800;font-size:24px;color:var(--accent);"></div>
    <div class="rank-bar-wrap"><div class="rank-bar-track"><div id="profileRankBar" class="rank-bar-fill"></div></div><div id="profileRankLabel" class="rank-bar-label"></div></div>
    <div id="profileStats" class="stat-grid"></div>
    <h4 style="margin-bottom:8px;">Achievements</h4>

for (let i=1;i<=30;i++) ACHIEVEMENTS_DATA.push({id:`run_${i}`,stat:'runsSuccessful',need:i*10,icon:'🚀',name:`Runner ${i}`,desc:`${i*10} successful runs`});
for (let i=1;i<=30;i++) ACHIEVEMENTS_DATA.push({id:`line_${i}`,stat:'linesTyped',need:i*100,icon:'📝',name:`Line Lord ${i}`,desc:`${(i*100).toLocaleString()} lines typed`});
for (let i=1;i<=30;i++) ACHIEVEMENTS_DATA.push({id:`back_${i}`,stat:'backspaces',need:i*200,icon:'🔙',name:`Eraser ${i}`,desc:`${(i*200).toLocaleString()} backspaces used`});

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, getDocs, deleteDoc, collection, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const firebaseConfig = { apiKey:"AIzaSyCOKp_ksThO3E_oc_H7NWMqkPTuLoDrrKI", authDomain:"ideqvr.firebaseapp.com", projectId:"ideqvr", storageBucket:"ideqvr.firebasestorage.app", messagingSenderId:"258032258981", appId:"1:258032258981:web:d302dcc896d5ab18c2e24c", measurementId:"G-JDEF11SPS6" };
  const app = initializeApp(firebaseConfig); const db = getFirestore(app); window._db = db; window._firestoreFns = { doc, setDoc, getDoc, getDocs, deleteDoc, collection, onSnapshot, increment };
  const userId = sessionStorage.getItem('pycloud_userId'); const userRole = sessionStorage.getItem('pycloud_role');
  if (!userId) window.location.href = 'index.html'; if (userRole === 'superadmin') document.body.classList.add('is-admin');
  onSnapshot(doc(db, "settings", "global"), (docSnap) => {
    if (docSnap.exists()) {
      const data = docSnap.data(); window._globalSettings = data;
      if (data.assets?.logoUrl) { const hLogo = document.getElementById('headerLogo'); hLogo.src = data.assets.logoUrl; hLogo.classList.add('loaded'); }

      if (data.siteName) document.getElementById('setSiteName').value = data.siteName;
      if (data.displayName) { document.getElementById('bossDisplayName').textContent = data.displayName + ' AI'; document.getElementById('setDisplayName').value = data.displayName; }

      applyBtnIcon('settingsBtnIcon', data.assets?.settingsIconUrl); applyBtnIcon('profileBtnIcon', data.assets?.profileIconUrl); applyBtnIcon('runBtnIcon', data.assets?.runIconUrl); applyBtnIcon('saveBtnIcon', data.assets?.saveIconUrl);
    }
  });
  onSnapshot(doc(db, "stats", userId), (docSnap) => { if (docSnap.exists()) { window._statsData = docSnap.data(); if (window._renderProfile) window._renderProfile(); if (window._checkAchievements) window._checkAchievements(); } });
  window._flushStats = async function() {
    const delta = window._statsDelta; if (!delta) return;
    const total = (delta.lettersTyped||0)+(delta.backspaces||0)+(delta.runsSuccessful||0)+(delta.linesTyped||0)+(delta.functionsRun||0);
    if (total === 0) return; window._statsDelta = { lettersTyped:0, backspaces:0, runsSuccessful:0, linesTyped:0, functionsRun:0 };
    try { await setDoc(doc(db,'stats', userId), { lettersTyped:increment(delta.lettersTyped||0), backspaces:increment(delta.backspaces||0), runsSuccessful:increment(delta.runsSuccessful||0), linesTyped:increment(delta.linesTyped||0), functionsRun:increment(delta.functionsRun||0) }, { merge:true }); } catch(e) {}
  };
  setInterval(() => window._flushStats(), 30000);
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
let editor, pyodide, pyodideReady = false, isDownloading = false;
const output = document.getElementById('output'); const bossChat = document.getElementById('bossChat'); const consoleInput = document.getElementById('console-input'); const typingIndicator = document.getElementById('typingIndicator');
window._statsDelta = { lettersTyped:0, backspaces:0, runsSuccessful:0, linesTyped:0, functionsRun:0 };

if (sessionStorage.getItem('just_logged_in')) {
  const gate = document.getElementById('ideGateOverlay'); gate.classList.add('gate-visible');
  setTimeout(() => gate.classList.add('opening'), 100);
  setTimeout(() => { gate.style.transition = 'opacity 0.5s'; gate.style.opacity = '0'; setTimeout(() => { gate.style.display = 'none'; gate.classList.add('gate-done'); }, 500); }, 3500);
  sessionStorage.removeItem('just_logged_in');
}

const THEMES = ['dark','light','red','green','blue']; const MONACO_THEMES = { dark:'vs-dark', light:'vs', red:'theme-red', green:'theme-green', blue:'theme-blue' };
let currentTheme = localStorage.getItem('pycloud_theme') || 'dark';
function setTheme(name) {
  currentTheme = name; document.body.classList.remove(...THEMES.map(t => 'theme-'+t)); if (name !== 'dark') document.body.classList.add('theme-'+name);
  localStorage.setItem('pycloud_theme', name); if (typeof monaco !== 'undefined') monaco.editor.setTheme(MONACO_THEMES[name] || 'vs-dark');
}
setTheme(currentTheme);
document.getElementById('themeToggle').onclick = () => { let idx = (THEMES.indexOf(currentTheme) + 1) % THEMES.length; setTheme(THEMES[idx]); showToast('Theme: ' + THEMES[idx].toUpperCase()); };

require.config({ paths:{ vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
require(['vs/editor/editor.main'], function() {
  monaco.editor.defineTheme('theme-red', { base:'vs-dark', inherit:true, rules:[], colors:{ 'editor.background':'#0f0608', 'editor.foreground':'#fde8ea' } });
  monaco.editor.defineTheme('theme-green', { base:'vs-dark', inherit:true, rules:[], colors:{ 'editor.background':'#060f08', 'editor.foreground':'#e8fdee' } });
  monaco.editor.defineTheme('theme-blue', { base:'vs-dark', inherit:true, rules:[], colors:{ 'editor.background':'#060a0f', 'editor.foreground':'#e8f4fd' } });
  editor = monaco.editor.create(document.getElementById('editor'), { value:"# Welcome Boss\nprint('Ready to cook?')", language:'python', theme: MONACO_THEMES[currentTheme] || 'vs-dark', fontSize:14, fontFamily:"'Space Mono',monospace", automaticLayout:true });
  editor.onDidChangeModelContent((e) => { trackKeystroke(); const lastChange = e.changes[0].text; for (const [kw, msg] of Object.entries(KEYWORD_REACTIONS)) { if (lastChange.includes(kw)) { addBossMsg(msg); break; } } });
  editor.onKeyDown((e) => { const k = e.browserEvent.key; if (k === 'Backspace' || k === 'Delete') window._statsDelta.backspaces++; else if (k === 'Enter') { window._statsDelta.lettersTyped++; window._statsDelta.linesTyped++; } else if (k.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) window._statsDelta.lettersTyped++; });
});

consoleInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const code = consoleInput.value.trim(); if (!code) return; if (!pyodideReady) { addOutput('[ERROR] Python engine not ready.', 'error'); return; }
    addOutput('>>> ' + code, 'info'); consoleInput.value = '';
    try { pyodide.runPython('import sys, io; sys.stdout = io.StringIO(); sys.stderr = io.StringIO()'); const result = await pyodide.runPythonAsync(code); const stdout = pyodide.runPython('sys.stdout.getvalue()'); const stderr = pyodide.runPython('sys.stderr.getvalue()'); if (stdout) addOutput(stdout.trimEnd()); if (stderr) addOutput(stderr.trimEnd(), 'error'); if (result !== undefined && result !== null) addOutput(String(result)); window._statsDelta.runsSuccessful++; } catch(err) { addOutput(String(err).split('\n').pop(), 'error'); }
  }
});

function addOutput(text, type='') { const span = document.createElement('span'); if (type) span.className = type; span.textContent = text + '\n'; output.appendChild(span); output.scrollTop = output.scrollHeight; }
function addBossMsg(text) { const msg = document.createElement('div'); msg.className = 'msg boss'; msg.textContent = text; bossChat.appendChild(msg); bossChat.scrollTop = bossChat.scrollHeight; setTimeout(() => { msg.classList.add('fade-out'); setTimeout(() => msg.remove(), 500); }, 10000); }
let typingTimeout; function trackKeystroke() { typingIndicator.style.display = 'block'; clearTimeout(typingTimeout); typingTimeout = setTimeout(() => { typingIndicator.style.display = 'none'; if (Math.random() > 0.98) addBossMsg(BOSS_MESSAGES[Math.floor(Math.random()*BOSS_MESSAGES.length)]); }, 1500); }

window._checkAchievements = function() { const stats = window._statsData || {}; ACHIEVEMENTS_DATA.forEach(ach => { const key = 'ach_' + sessionStorage.getItem('pycloud_userId') + '_' + ach.id; if (stats[ach.stat] >= ach.need && !localStorage.getItem(key)) { localStorage.setItem(key,'true'); addBossMsg(`🏆 ACHIEVEMENT: ${ach.name}!`); showToast(`🏆 ${ach.name} Unlocked!`); } }); };
const RANKS = [{ name:'Beginner Coder', icon:'🌱', min:0, color:'#4a5568' },{ name:'Intermediate Coder', icon:'⚡', min:1000, color:'#00e5ff' },{ name:'Epic Coder', icon:'🔥', min:5000, color:'#00ff9d' },{ name:'Legendary Coder', icon:'👑', min:20000, color:'#f59e0b' },{ name:'Mythic Coder', icon:'🌌', min:100000, color:'#7c3aed' }];
function calcScore(s) { return Math.floor((s.lettersTyped||0)*0.5 + (s.runsSuccessful||0)*50 + (s.linesTyped||0)*3 + (s.functionsRun||0)*30); }
window._renderProfile = function() {
  const s = window._statsData || {}; const score = calcScore(s); let rank = RANKS[0], next = null; for (const r of RANKS) { if (score >= r.min) rank = r; else { next = r; break; } } const rankPct = next ? Math.min(100, ((score-rank.min)/(next.min-rank.min))*100) : 100;
  document.getElementById('profileRankBadge').innerHTML = `<span class="rank-icon-big">${rank.icon}</span><span class="rank-name-big" style="color:${rank.color}">${rank.name}</span>`;
  document.getElementById('profileScore').textContent = score.toLocaleString() + ' XP'; document.getElementById('profileRankBar').style.cssText = `width:${rankPct}%;background:${rank.color};`; document.getElementById('profileRankLabel').textContent = next ? `${Math.round(rankPct)}% to ${next.name}` : 'MAX RANK';
  const statsRows = [{v:s.lettersTyped,l:'Keys'},{v:s.backspaces,l:'Back'},{v:s.runsSuccessful,l:'Runs'},{v:s.linesTyped,l:'Lines'},{v:s.functionsRun,l:'Funcs'},{v:score,l:'XP'}];
  document.getElementById('profileStats').innerHTML = statsRows.map(r => `<div class="stat-card"><div class="stat-value">${(r.v||0).toLocaleString()}</div><div class="stat-label">${r.l}</div></div>`).join('');
  document.getElementById('profileAchievements').innerHTML = ACHIEVEMENTS_DATA.map(a => { const val = s[a.stat]||0; const pct = Math.min(100,(val/a.need)*100); const unlocked = val >= a.need; return `<div class="ach-item ${unlocked?'ach-unlocked':'ach-locked'}"><div class="ach-icon">${a.icon}</div><div class="ach-meta"><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div><div class="ach-bar"><div class="ach-fill" style="width:${pct}%"></div></div></div></div>`; }).join('');
};

async function loadPyodideWithProgress() {
  if (isDownloading) return; isDownloading = true; const overlay = document.getElementById('loaderOverlay'); const bar = document.getElementById('progressBar'); const status = document.getElementById('loaderStatus'); const eta = document.getElementById('loaderEta'); overlay.style.display = 'flex';
  const originalFetch = window.fetch; window.fetch = async function(input, init) {
    const url = (typeof input==='string') ? input : (input?.url ?? ''); const response = await originalFetch(input, init);
    if (url.includes('pyodide.asm.wasm')) {
      const total = parseInt(response.headers.get('content-length') || '28500000'); let received = 0; const t0 = Date.now(); const reader = response.body.getReader();
      return new Response(new ReadableStream({ start(controller) { function pump() { return reader.read().then(({ done, value }) => { if (done) { controller.close(); return; } received += value.length; const pct = Math.min(95,(received/total)*100); bar.style.width = pct+'%'; const elapsed = (Date.now()-t0)/1000; const speed = received/Math.max(elapsed,0.1); const etaSec = Math.ceil((total-received)/speed); eta.textContent = `ESTIMATED TIME: ${etaSec}s`; controller.enqueue(value); return pump(); }); } return pump(); } }), { headers:response.headers });
    }
    return response;
  };
  const script = document.createElement('script'); script.src = "https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"; document.head.appendChild(script);
  script.onload = async () => { pyodide = await loadPyodide({ indexURL:"https://cdn.jsdelivr.net/pyodide/v0.25.1/full/" }); await pyodide.runPythonAsync(`import builtins, js; builtins.input = lambda p='': js.window.prompt(str(p) if p else '')`); pyodideReady = true; window.fetch = originalFetch; bar.style.width = '100%'; try { const pyVer = pyodide.runPython('import sys; sys.version.split()[0]'); document.getElementById('pyVersion').textContent = '🐍 Python ' + pyVer; } catch(_) {} setTimeout(() => overlay.style.display = 'none', 500); runCode(); };
}

function handleRunClick() { if (!pyodideReady) { if (confirm("Python runtime not installed. Download required. Continue?")) loadPyodideWithProgress(); } else runCode(); }
async function runCode() {
  const code = editor.getValue(); output.innerHTML = ''; addOutput('Running...', 'info'); document.getElementById('runBtn').disabled = true;
  try { await pyodide.loadPackagesFromImports(code); pyodide.runPython('import sys, io; sys.stdout = io.StringIO(); sys.stderr = io.StringIO()'); await pyodide.runPythonAsync(code); const res = pyodide.runPython('sys.stdout.getvalue()'); const err = pyodide.runPython('sys.stderr.getvalue()'); output.innerHTML = ''; if (res) addOutput(res); if (err) { addOutput(err, 'error'); addBossMsg("Syntax or logic error detected, Boss."); } if (!res && !err) addOutput('(no output)', 'info'); window._statsDelta.runsSuccessful++; window._statsDelta.functionsRun += (code.match(/^\s*def\s+\w+/gm)||[]).length; if (!err) addBossMsg("Execution successful."); } catch(e) { output.innerHTML = ''; addOutput(String(e).split('\n').pop(), 'error'); addBossMsg("I found a syntax error. Check your code!"); } finally { document.getElementById('runBtn').disabled = false; }
}

async function saveProject() { const name = document.getElementById('projectName').value.trim() || 'untitled'; const code = editor.getValue(); const uid = sessionStorage.getItem('pycloud_userId'); try { await window._firestoreFns.setDoc(window._firestoreFns.doc(window._db, 'users', uid, 'projects', name), { name, code, updatedAt: new Date().toISOString() }); showToast(`🛡️ Saved: ${name}`); } catch(e) { showToast('❌ Save failed'); } }
async function openLoadModal() { const list = document.getElementById('projectList'); list.innerHTML = 'Loading...'; openModal('loadModal'); const uid = sessionStorage.getItem('pycloud_userId'); const snap = await window._firestoreFns.getDocs(window._firestoreFns.collection(window._db, 'users', uid, 'projects')); list.innerHTML = ''; snap.forEach(docSnap => { const d = docSnap.data(); const div = document.createElement('div'); div.style.cssText = "padding:10px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:12px;"; div.innerHTML = `<span>${d.name}</span><button style="background:var(--red);color:#fff;padding:2px 8px;font-size:10px;">del</button>`; div.onclick = () => { editor.setValue(d.code); document.getElementById('projectName').value = d.name; closeModal('loadModal'); }; div.querySelector('button').onclick = (e) => { e.stopPropagation(); window._firestoreFns.deleteDoc(window._firestoreFns.doc(window._db, 'users', uid, 'projects', d.name)); div.remove(); }; list.appendChild(div); }); }

function toggleCommandPalette() { const p = document.getElementById('commandPalette'); const visible = p.style.display === 'flex'; p.style.display = visible ? 'none' : 'flex'; if (!visible) document.getElementById('commandInput').focus(); }
document.getElementById('commandInput').onkeydown = (e) => { if (e.key === 'Escape') toggleCommandPalette(); };
window.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === 'k') { e.preventDefault(); toggleCommandPalette(); } });

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
function pickAndUpload(key) { const i = document.createElement('input'); i.type = 'file'; i.accept = 'image/*'; i.onchange = async (e) => { const f = e.target.files[0]; if (!f) return; document.getElementById('uploadProgress').style.display = 'block'; try { await window._compressAndUpload(f, key); showToast('✅ Asset synced!'); } catch(err) { showToast('❌ Failed'); } document.getElementById('uploadProgress').style.display = 'none'; }; i.click(); }
function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
window.saveGlobalSettings = async function() { const name = document.getElementById('setSiteName').value; const disp = document.getElementById('setDisplayName').value; const pass = document.getElementById('setGlobalPass').value; await window._firestoreFns.setDoc(window._firestoreFns.doc(window._db,"settings","global"), { siteName:name, displayName:disp, password:pass }, { merge:true }); showToast("🛡️ Global settings updated!"); };
window.saveAdminStats = async function() { const fields = ['lettersTyped','backspaces','runsSuccessful','linesTyped','functionsRun']; const updates = {}; for (const f of fields) { const el = document.getElementById('admin_'+f); if (el && el.value.trim() !== '') updates[f] = Math.max(0, parseInt(el.value)||0); } try { await window._firestoreFns.setDoc(window._firestoreFns.doc(window._db,'stats', sessionStorage.getItem('pycloud_userId')), updates, { merge:true }); showToast('✅ Stats overridden!'); } catch(e) { showToast('❌ Failed: '+e.message); } };
document.getElementById('clearBtn').onclick = () => { output.innerHTML = ''; };
</script>
